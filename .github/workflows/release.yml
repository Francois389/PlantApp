name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # 1. Récupération de la version
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v2
      - uses: thecodemonkey/action-get-gradle-version@master
        id: version
        with:
          file: build.gradle.kts

  # 2. Build multiplateforme
  build:
    needs: get-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            type: deb
            artifact-name: linux
          - os: windows-latest
            type: exe
            artifact-name: windows
          - os: macos-latest
            type: dmg
            artifact-name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR + dépendances
        run: |
          chmod +x gradlew
          ./gradlew copyDependencies

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: bash .github/scripts/jpackage-unix.sh ${{ matrix.type }} ${{ needs.get-version.outputs.version }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .github/scripts/jpackage-windows.ps1 -Type ${{ matrix.type }} -Version ${{ needs.get-version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.artifact-name }}
          path: build/jpackage-output/*.${{ matrix.type }}

  # 3. Création de la GitHub Release
  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger les artefacts
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   v${{ needs.get-version.outputs.version }}
          name:       "PlantApp v${{ needs.get-version.outputs.version }}"
          body:       "## PlantApp v${{ needs.get-version.outputs.version }}"
          files:      installers/*
          draft:      false
          prerelease: ${{ contains(needs.get-version.outputs.version, 'SNAPSHOT') }}