name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de version (ex: v1.0.0)'
        required: true
  push:
    tags:
      - 'v*.*.*'

# La version est extraite du tag Git (ex: v1.0.0 → 1.0.0)
env:
  VERSION: ${{ github.ref_name != 'main' && github.ref_name || github.event.inputs.tag }}

jobs:

  # 1. Build multiplateforme
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            type: deb
            artifact-name: linux
          - os: windows-latest
            type: exe
            artifact-name: windows
          - os: macos-latest
            type: dmg
            artifact-name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extraire la version depuis le tag
        id: version
        shell: bash
        run: echo "value=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build JAR + dépendances
        run: |
          chmod +x gradlew
          ./gradlew copyDependencies

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: bash .github/scripts/jpackage-unix.sh ${{ matrix.type }} ${{ steps.version.outputs.value }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .github/scripts/jpackage-windows.ps1 -Type ${{ matrix.type }} -Version ${{ steps.version.outputs.value }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.artifact-name }}
          path: build/jpackage-output/*.${{ matrix.type }}

  # 2. Création de la GitHub Release
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extraire la version depuis le tag
        id: version
        shell: bash
        run: echo "value=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Télécharger les artefacts
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ env.VERSION }}
          name:       "PlantApp v${{ steps.version.outputs.value }}"
          body:       "## PlantApp v${{ steps.version.outputs.value }}"
          files:      installers/*
          draft:      false
          prerelease: ${{ contains(env.VERSION, '-') }}