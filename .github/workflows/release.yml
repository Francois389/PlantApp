name: Build & Release

on:
  workflow_dispatch:

# 1. Extraire la version depuis build.gradle.kts
jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v2
      - uses: thecodemonkey/action-get-gradle-version@master
        id: version
        with:
          file: build.gradle.kts

# 2. Build multiplateforme
  build:
    needs: get-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            type: deb
            artifact-name: linux
            executable: PlantApp_${{ needs.get-version.outputs.version }}.deb
          - os: windows-latest
            type: exe
            artifact-name: windows
            executable: PlantApp_${{ needs.get-version.outputs.version }}.exe
          - os: macos-latest
            type: dmg
            artifact-name: macos
            executable: PlantApp_${{ needs.get-version.outputs.version }}.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission (Linux/Mac)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build JAR + copy dependencies
        run: ./gradlew copyDependencies

      - name: Package with jpackage (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          JAVAFX_JARS=$(find ~/.gradle/caches -name "javafx*.jar" | grep -v sources | tr '\n' ':' | sed 's/:$//')
          MAIN_JAR=$(ls build/jpackage-input/*.jar | grep -v "javafx\|controlsfx\|plantuml\|junit" | head -1 | xargs basename)
          echo "Main JAR détecté : $MAIN_JAR"
          jpackage \
            --type ${{ matrix.type }} \
            --name PlantApp \
            --app-version ${{ needs.get-version.outputs.version }} \
            --input build/jpackage-input \
            --main-jar "$MAIN_JAR" \
            --main-class com.fsp.plantapp.PlantApp \
            --module-path "$JAVAFX_JARS" \
            --add-modules javafx.controls,javafx.fxml \
            --dest build/jpackage-output

      - name: Package with jpackage (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $javafxJars = (Get-ChildItem -Recurse "$env:USERPROFILE\.gradle\caches" -Filter "javafx*.jar" | Where-Object { $_.Name -notlike "*sources*" } | Select-Object -ExpandProperty FullName) -join ";"
          $mainJar = (Get-ChildItem "build/jpackage-input/*.jar" | Where-Object { $_.Name -notmatch "javafx|controlsfx|plantuml|junit" } | Select-Object -First 1).Name
          Write-Host "Main JAR détecté : $mainJar"
          jpackage `
            --type ${{ matrix.type }} `
            --name PlantApp `
            --app-version ${{ needs.get-version.outputs.version }} `
            --input build/jpackage-input `
            --main-jar "$mainJar" `
            --main-class com.fsp.plantapp.PlantApp `
            --module-path "$javafxJars" `
            --add-modules javafx.controls,javafx.fxml `
            --dest build/jpackage-output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.artifact-name }}
          path: build/jpackage-output/*.${{ matrix.type }}

# 3. Créer la GitHub Release
  release:
    needs: [ get-version, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers/
          merge-multiple: true

      - name: List installers
        run: ls -lh installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: "PlantApp v${{ needs.get-version.outputs.version }}"
          body: |
            ## PlantApp v${{ needs.get-version.outputs.version }}
          files: installers/*
          draft: false
          prerelease: ${{ contains(needs.get-version.outputs.version, 'SNAPSHOT') }}
